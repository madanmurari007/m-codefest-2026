version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Pipe Amplify Console env vars into .env.production so Next.js
        # (server runtime + API routes) can read them via process.env.
        - echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production
        - echo "NEXT_PUBLIC_OPENAI_BASE_URL=$NEXT_PUBLIC_OPENAI_BASE_URL" >> .env.production
        - echo "NEXT_PUBLIC_OPENAI_MODEL=$NEXT_PUBLIC_OPENAI_MODEL" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*